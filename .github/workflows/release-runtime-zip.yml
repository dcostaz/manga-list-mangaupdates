name: release-runtime-zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build runtime zip
        run: |
          rm -f dist/*.zip
          npm run build

      - name: Prepare stable asset name
        run: |
          ZIP_PATH=$(ls dist/*.zip | head -n 1)
          cp "$ZIP_PATH" dist/manga-list-mangaupdates-runtime.zip

      - name: Publish latest runtime release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: runtime-latest
          name: Latest Runtime Package
          body: Latest automated runtime package build from main.
          files: dist/manga-list-mangaupdates-runtime.zip
          overwrite_files: true
